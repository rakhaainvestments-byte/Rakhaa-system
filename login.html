<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Architectural Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #F5F3F0 0%, #EBE7E2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid #E8E2DC;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 700;
            color: #1E1E1E;
            margin-bottom: 8px;
        }

        .logo i {
            color: #A67B5B;
            font-size: 32px;
        }

        .welcome-text {
            color: #6B5E54;
            font-size: 16px;
            margin-top: 8px;
        }

        .google-signin-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            min-height: 50px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #A69B91;
            font-size: 14px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #E0D8D0;
        }

        .divider span {
            padding: 0 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2C241E;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #A69B91;
        }

        .form-control {
            width: 100%;
            padding: 16px 48px 16px 16px;
            border: 1.5px solid #E0D8D0;
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
            background: #FDFCFB;
        }

        .form-control:focus {
            outline: none;
            border-color: #A67B5B;
            background: white;
            box-shadow: 0 0 0 4px rgba(166, 123, 91, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #A67B5B;
        }

        .forgot-link {
            color: #A67B5B;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1E1E1E;
            color: white;
            border: none;
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 24px;
        }

        .login-btn:hover {
            background: #3A322B;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .testimonial {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #EBE5DF;
            text-align: center;
        }

        .testimonial blockquote {
            color: #5A4E45;
            font-style: italic;
            margin-bottom: 12px;
        }

        .testimonial cite {
            color: #A67B5B;
            font-weight: 600;
            font-style: normal;
        }

        .signup-link {
            text-align: center;
            margin-top: 24px;
            color: #6B5E54;
        }

        .signup-link a {
            color: #A67B5B;
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert-error {
            background: #FEE2E2;
            color: #DC2626;
        }

        .alert-success {
            background: #D1FAE5;
            color: #059669;
        }

        .alert-info {
            background: #E3F2FD;
            color: #1565C0;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Google Sign-In Configuration -->
    <div id="g_id_onload"
         data-client_id="876111425484-6hrf70a1d9kh2uvcrr56ih3f1koro67v.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleGoogleSignIn"
         data-auto_prompt="false">
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo">
                    <i class="fas fa-landmark"></i>
                    Architectural Ledger
                </div>
                <p class="welcome-text">مرحباً بعودتك</p>
                <p style="color: #8B7B6E; font-size: 14px; margin-top: 4px;">الوصول إلى لوحة التحكم المالية الآمنة</p>
            </div>

            <div id="alertMessage" class="alert"></div>

            <!-- Google Sign-In Button -->
            <div class="google-signin-wrapper">
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left"
                     data-width="100%">
                </div>
            </div>

            <div class="divider">
                <span>أو استخدام بيانات الاعتماد</span>
            </div>

            <!-- Email/Password Login Form -->
            <form id="loginForm" onsubmit="handleEmailLogin(event)">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" 
                               class="form-control" 
                               id="email" 
                               name="email" 
                               placeholder="name@firm.com"
                               value="admin@architectural-ledger.com"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               name="password" 
                               placeholder="••••••••"
                               value="Admin@123"
                               required>
                    </div>
                </div>

                <div class="form-options">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="remember" name="remember" checked>
                        <label for="remember">تذكر هذا الجهاز</label>
                    </div>
                    <a href="#" class="forgot-link" onclick="forgotPassword(event)">هل نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt" style="margin-left: 8px;"></i>
                    تسجيل الدخول إلى Ledger
                </button>
            </form>

            <div class="testimonial">
                <blockquote>
                    "منصة الضرائب الأكثر سهولة التي استخدمتها خلال 20 عاماً من الممارسة."
                </blockquote>
                <cite>— شريك التدقيق الرئيسي</cite>
            </div>

            <div class="signup-link">
                جديد في Architectural Ledger؟ 
                <a href="#" onclick="showSignup(event)">إنشاء حساب</a>
            </div>
        </div>
    </div>

    <script>
        // ===== نظام المصادقة المتكامل =====
        
        // تكوين التطبيق
        const APP_CONFIG = {
            apiUrl: window.location.origin,
            sessionKey: 'ledger_session',
            usersFile: 'users.json'
        };

        // دالة callback لـ Google Sign-In
        async function handleGoogleSignIn(response) {
            console.log('Google Sign-In response:', response);
            
            if (!response.credential) {
                showAlert('فشل تسجيل الدخول باستخدام Google', 'error');
                return;
            }
            
            showAlert('جاري معالجة تسجيل الدخول...', 'info');
            
            try {
                // فك تشفير JWT token من Google
                const credential = response.credential;
                const decodedToken = parseJwt(credential);
                
                console.log('Decoded Google token:', decodedToken);
                
                // معلومات المستخدم من Google
                const googleUser = {
                    email: decodedToken.email,
                    name: decodedToken.name,
                    picture: decodedToken.picture,
                    googleId: decodedToken.sub,
                    emailVerified: decodedToken.email_verified
                };
                
                // التحقق من وجود المستخدم أو إنشائه
                const user = await findOrCreateGoogleUser(googleUser);
                
                if (user) {
                    // إنشاء جلسة للمستخدم
                    createUserSession(user);
                    showAlert(`مرحباً ${user.name}! جاري التحويل...`, 'success');
                    
                    // التحويل إلى الصفحة الرئيسية
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showAlert('غير مصرح لهذا المستخدم بالدخول', 'error');
                }
            } catch (error) {
                console.error('Google Sign-In error:', error);
                showAlert('حدث خطأ أثناء معالجة تسجيل الدخول', 'error');
            }
        }

        // فك تشفير JWT token
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (error) {
                console.error('JWT parse error:', error);
                return {};
            }
        }

        // البحث عن مستخدم Google أو إنشائه
        async function findOrCreateGoogleUser(googleUser) {
            try {
                const response = await fetch(APP_CONFIG.usersFile);
                const data = await response.json();
                
                // البحث عن مستخدم بنفس البريد الإلكتروني أو Google ID
                let user = data.users.find(u => 
                    u.email.toLowerCase() === googleUser.email.toLowerCase() || 
                    u.googleId === googleUser.googleId
                );
                
                if (!user) {
                    // التحقق مما إذا كان البريد الإلكتروني مسموحاً به
                    const domain = googleUser.email.split('@')[1];
                    const allowedDomains = data.google_auth_config.allowed_domains || [];
                    
                    if (allowedDomains.includes(domain) || data.google_auth_config.enabled) {
                        // إنشاء مستخدم جديد
                        user = {
                            id: 'usr_' + Date.now(),
                            email: googleUser.email,
                            name: googleUser.name,
                            role: 'viewer', // دور افتراضي
                            googleId: googleUser.googleId,
                            avatar: googleUser.picture,
                            createdAt: new Date().toISOString(),
                            lastLogin: new Date().toISOString(),
                            permissions: ['view_filings'],
                            department: 'External'
                        };
                        
                        // في التطبيق الحقيقي، هنا يتم حفظ المستخدم في الخادم
                        console.log('New user created:', user);
                    }
                }
                
                return user;
            } catch (error) {
                console.error('Error finding/creating user:', error);
                
                // بيانات افتراضية للتجربة
                if (googleUser.email) {
                    return {
                        id: 'usr_google_' + Date.now(),
                        email: googleUser.email,
                        name: googleUser.name || 'Google User',
                        role: 'viewer',
                        googleId: googleUser.googleId,
                        avatar: googleUser.picture,
                        permissions: ['view_filings'],
                        department: 'External'
                    };
                }
                return null;
            }
        }

        // معالجة تسجيل الدخول بالبريد الإلكتروني
        async function handleEmailLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> جاري تسجيل الدخول...';
            
            try {
                const user = await authenticateUser(email, password);
                
                if (user) {
                    createUserSession(user, remember);
                    showAlert(`مرحباً ${user.name}! جاري التحويل...`, 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showAlert('البريد الإلكتروني أو كلمة المرور غير صحيحة', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('حدث خطأ أثناء تسجيل الدخول', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-left: 8px;"></i> تسجيل الدخول إلى Ledger';
            }
        }

        // مصادقة المستخدم
        async function authenticateUser(email, password) {
            try {
                const response = await fetch(APP_CONFIG.usersFile);
                const data = await response.json();
                
                const user = data.users.find(u => u.email.toLowerCase() === email.toLowerCase());
                
                if (user) {
                    // في التطبيق الحقيقي، التحقق من كلمة المرور باستخدام bcrypt
                    // للتجربة: أي كلمة مرور مقبولة
                    return {
                        id: user.id,
                        email: user.email,
                        name: user.name,
                        role: user.role,
                        avatar: user.avatar,
                        permissions: user.permissions,
                        department: user.department
                    };
                }
                
                // مستخدم افتراضي للتجربة
                if (email === 'admin@architectural-ledger.com' && password === 'Admin@123') {
                    return {
                        id: 'usr_admin',
                        email: email,
                        name: 'System Administrator',
                        role: 'admin',
                        avatar: 'https://ui-avatars.com/api/?name=System+Administrator&background=A67B5B&color=fff',
                        permissions: ['all'],
                        department: 'IT Administration'
                    };
                }
                
                return null;
            } catch (error) {
                console.error('Auth error:', error);
                
                // بيانات افتراضية للتجربة
                if (email === 'admin@architectural-ledger.com' && password === 'Admin@123') {
                    return {
                        id: 'usr_admin',
                        email: email,
                        name: 'System Administrator',
                        role: 'admin',
                        avatar: 'https://ui-avatars.com/api/?name=System+Administrator&background=A67B5B&color=fff',
                        permissions: ['all'],
                        department: 'IT Administration'
                    };
                }
                return null;
            }
        }

        // إنشاء جلسة المستخدم
        function createUserSession(user, remember = true) {
            const sessionData = {
                user: {
                    id: user.id,
                    email: user.email,
                    name: user.name,
                    role: user.role,
                    avatar: user.avatar,
                    permissions: user.permissions || [],
                    department: user.department
                },
                token: generateToken(user.id),
                expiresAt: remember ? 
                    new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString() :
                    new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem(APP_CONFIG.sessionKey, JSON.stringify(sessionData));
            console.log('Session created:', sessionData);
        }

        // إنشاء رمز مميز
        function generateToken(userId) {
            return 'token_' + userId + '_' + Date.now() + '_' + Math.random().toString(36).substr(2);
        }

        // عرض التنبيهات
        function showAlert(message, type = 'info') {
            const alertEl = document.getElementById('alertMessage');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type}`;
            alertEl.style.display = 'block';
            
            if (type !== 'error') {
                setTimeout(() => {
                    alertEl.style.display = 'none';
                }, 5000);
            }
        }

        // نسيت كلمة المرور
        function forgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            
            if (email) {
                showAlert(`تم إرسال رابط إعادة تعيين كلمة المرور إلى ${email}`, 'success');
            } else {
                showAlert('الرجاء إدخال البريد الإلكتروني أولاً', 'error');
            }
        }

        // عرض التسجيل
        function showSignup(event) {
            event.preventDefault();
            showAlert('لإنشاء حساب جديد، يرجى التواصل مع مسؤول النظام', 'info');
        }

        // التحقق من الجلسة الحالية
        function checkExistingSession() {
            const session = localStorage.getItem(APP_CONFIG.sessionKey);
            
            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    const expiresAt = new Date(sessionData.expiresAt);
                    
                    if (expiresAt > new Date()) {
                        showAlert('تم اكتشاف جلسة نشطة. جاري التحويل...', 'info');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                        return true;
                    } else {
                        localStorage.removeItem(APP_CONFIG.sessionKey);
                    }
                } catch (error) {
                    localStorage.removeItem(APP_CONFIG.sessionKey);
                }
            }
            return false;
        }

        // تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            // التحقق من الجلسة الحالية
            if (!checkExistingSession()) {
                document.getElementById('email').focus();
            }
            
            // مراقبة حالة Google Sign-In
            console.log('Google Sign-In initialized with client ID: 876111425484-6hrf70a1d9kh2uvcrr56ih3f1koro67v.apps.googleusercontent.com');
        });

        // معالجة الضغط على Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                const form = document.getElementById('loginForm');
                if (form) {
                    e.preventDefault();
                    handleEmailLogin(e);
                }
            }
        });

        // تصدير الدوال للاستخدام العام
        window.handleGoogleSignIn = handleGoogleSignIn;
        window.handleEmailLogin = handleEmailLogin;
        window.forgotPassword = forgotPassword;
        window.showSignup = showSignup;
    </script>
</body>
</html>
