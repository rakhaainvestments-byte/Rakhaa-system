<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معالجة تسجيل الدخول | Architectural Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #F5F3F0 0%, #EBE7E2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .callback-container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #F3EFEB;
            border-top-color: #A67B5B;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        h2 {
            color: #1E1E1E;
            margin-bottom: 8px;
        }
        
        p {
            color: #6B5E54;
        }
        
        .error-message {
            color: #DC2626;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner"></div>
        <h2>جاري معالجة تسجيل الدخول...</h2>
        <p>يرجى الانتظار</p>
        <p class="error-message" id="errorMessage" style="display: none;"></p>
    </div>

    <script>
        (function() {
            console.log('Login callback page loaded');
            
            // الحصول على معلمات URL
            const urlParams = new URLSearchParams(window.location.search);
            const credential = urlParams.get('credential');
            const error = urlParams.get('error');
            
            if (error) {
                showError('فشل تسجيل الدخول: ' + error);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
                return;
            }
            
            if (credential) {
                // تخزين بيانات الاعتماد مؤقتاً
                sessionStorage.setItem('google_credential', credential);
                
                // العودة إلى صفحة تسجيل الدخول مع البيانات
                setTimeout(() => {
                    window.location.href = 'login.html?google_auth=success';
                }, 500);
            } else {
                // التحقق من وجود بيانات في sessionStorage
                const storedCredential = sessionStorage.getItem('google_credential');
                
                if (storedCredential) {
                    // العودة إلى صفحة تسجيل الدخول
                    window.location.href = 'login.html?google_auth=success';
                } else {
                    showError('لم يتم استلام بيانات تسجيل الدخول');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }
            }
            
            function showError(message) {
                document.querySelector('.spinner').style.display = 'none';
                document.querySelector('h2').textContent = 'حدث خطأ';
                document.querySelector('p').textContent = message;
                document.getElementById('errorMessage').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
