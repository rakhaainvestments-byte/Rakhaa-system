<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - رخاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-gem"></i><span>رخاء</span><span class="logo-sub">للعاملين</span></div>
            <ul class="nav-menu">
                <li><a href="home.html" class="active"><i class="fas fa-home"></i> الرئيسية</a></li>
                <li><a href="files.html"><i class="fas fa-folder-open"></i> الملفات</a></li>
                <li><a href="admin.html" id="adminLink" style="display:none;"><i class="fas fa-cog"></i> لوحة التحكم</a></li>
            </ul>
            <div class="nav-actions">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
                    <div class="user-dropdown">
                        <div class="user-info"><span id="userName"></span><span id="userRole"></span></div>
                        <div class="dropdown-divider"></div>
                        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="welcome-card">
            <h1>مرحباً، <span id="welcomeName"></span></h1>
            <p>نظام إدارة ملفات مكتب رخاء للتنمية المستدامة</p>
        </div>

        <div class="quick-stats">
            <div class="stat-box"><i class="fas fa-globe"></i><h3 id="publicCount">0</h3><p>ملفات عامة</p></div>
            <div class="stat-box"><i class="fas fa-lock"></i><h3 id="privateCount">0</h3><p>ملفاتي الخاصة</p></div>
            <div class="stat-box"><i class="fas fa-users"></i><h3 id="usersCount">0</h3><p>موظف نشط</p></div>
        </div>

        <div class="section-header">
            <h2>آخر الملفات المرفوعة</h2>
            <a href="files.html" class="view-all">عرض الكل <i class="fas fa-arrow-left"></i></a>
        </div>
        <div class="files-grid" id="recentFilesGrid">جاري التحميل...</div>
    </main>

    <script src="auth.js"></script>
    <script>
        const currentUser = checkAuth();  // من auth.js
        if (!currentUser) window.location.href = 'index.html';

        document.addEventListener('DOMContentLoaded', function(){
            updateUI();
            loadStats();
            loadRecentFiles();
        });

        function updateUI() {
            document.getElementById('welcomeName').textContent = currentUser.name;
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userRole').textContent = currentUser.role === 'admin' ? 'مدير النظام' : 'موظف';
            if (currentUser.role === 'admin') document.getElementById('adminLink').style.display = 'block';
            if (currentUser.picture) {
                document.getElementById('userAvatar').innerHTML = `<img src="${currentUser.picture}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
            }
        }

        function loadStats() {
            const publicFiles = JSON.parse(localStorage.getItem('public_files') || '[]');
            const privateData = JSON.parse(localStorage.getItem('private_files') || '{}');
            const myPrivate = privateData[currentUser.id] || [];
            const users = JSON.parse(localStorage.getItem('rakha_users') || '[]');
            const activeUsers = users.filter(u => u.status === 'active').length;
            
            document.getElementById('publicCount').textContent = publicFiles.length;
            document.getElementById('privateCount').textContent = myPrivate.length;
            document.getElementById('usersCount').textContent = activeUsers;
        }

        function loadRecentFiles() {
            const publicFiles = JSON.parse(localStorage.getItem('public_files') || '[]');
            const privateData = JSON.parse(localStorage.getItem('private_files') || '{}');
            const myPrivate = privateData[currentUser.id] || [];
            
            let all = [
                ...publicFiles.map(f => ({...f, folder: 'public'})),
                ...myPrivate.map(f => ({...f, folder: 'private'}))
            ];
            all.sort((a,b) => new Date(b.uploadDate) - new Date(a.uploadDate));
            const recent = all.slice(0,4);
            const grid = document.getElementById('recentFilesGrid');
            
            if (!recent.length) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><p>لا توجد ملفات</p></div>';
                return;
            }
            
            grid.innerHTML = recent.map(f => `
                <div class="file-card">
                    <div class="file-card-header"><i class="fas ${getIcon(f.type)}"></i><span class="badge ${f.folder}">${f.folder==='public'?'عام':'خاص'}</span></div>
                    <h4>${f.name}</h4>
                    <p>${f.description || ''}</p>
                    <div class="file-meta"><span><i class="fas fa-user"></i> ${f.uploader}</span><span><i class="fas fa-calendar"></i> ${new Date(f.uploadDate).toLocaleDateString('ar-SA')}</span></div>
                </div>
            `).join('');
        }

        function getIcon(type) {
            if (type?.includes('pdf')) return 'fa-file-pdf';
            if (type?.includes('excel')||type?.includes('spreadsheet')) return 'fa-file-excel';
            if (type?.includes('word')||type?.includes('document')) return 'fa-file-word';
            if (type?.includes('image')) return 'fa-file-image';
            return 'fa-file';
        }
    </script>
</body>
</html>
