<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رخاء - تسجيل الدخول</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="logo-area">
      <i class="fas fa-leaf" style="color: #C9A84C; font-size: 3rem;"></i>
      <h1>رخاء <span>للتنمية المستدامة</span></h1>
    </div>
    <div class="login-box">
      <h2>تسجيل الدخول</h2>
      <form id="loginForm">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="كلمة المرور" required>
        </div>
        <button type="submit" class="btn-primary">دخول</button>
      </form>
      <div class="separator">أو</div>
      <button class="google-btn" id="googleSignIn">
        <i class="fab fa-google"></i> تسجيل الدخول بحساب Google
      </button>
      <p id="loginError" class="error-msg"></p>
      
    </div>
  </div>
  <script src="auth.js"></script>
  <script>
    // تهيئة المستخدمين الافتراضيين
    if (!localStorage.getItem('rokhaa_users')) {
      const defaultUsers = [
        { email: 'admin@rokhaa.com', password: 'admin123', name: 'مدير النظام', role: 'admin' },
        { email: 'user@rokhaa.com', password: 'user123', name: 'موظف', role: 'user' }
      ];
      localStorage.setItem('rokhaa_users', JSON.stringify(defaultUsers));
    }
  </script>
</body>
</html>
