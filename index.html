<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رخاء للتنمية المستدامة - تسجيل الدخول</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">🌿</div>
                <h1>رخاء</h1>
                <p>للتنمية المستدامة</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" required placeholder="example@domain.com">
                </div>
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-block">تسجيل الدخول</button>
            </form>
            
            <div class="divider">
                <span>أو</span>
            </div>
            
            <div class="google-signin">
                <div id="googleBtn" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    <span>تسجيل الدخول باستخدام Google</span>
                </div>
            </div>
            
            <div class="login-footer">
                <p>لأغراض العرض: <br> admin@rakha.com / admin123<br>user@rakha.com / user123</p>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="auth.js"></script>
    <script>
        // تهيئة صفحة تسجيل الدخول
        document.addEventListener('DOMContentLoaded', function() {
            // إذا كان المستخدم مسجل دخوله بالفعل، توجيه إلى home.html
            if (Auth.isLoggedIn()) {
                window.location.href = 'home.html';
                return;
            }

            // مستخدم افتراضي للمشرف إذا لم توجد بيانات
            if (!Storage.get('users')) {
                const defaultUsers = [
                    {
                        id: '1',
                        email: 'admin@rakha.com',
                        password: 'admin123',
                        name: 'مدير النظام',
                        role: 'admin',
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: '2',
                        email: 'user@rakha.com',
                        password: 'user123',
                        name: 'موظف',
                        role: 'user',
                        createdAt: new Date().toISOString()
                    }
                ];
                Storage.set('users', defaultUsers);
            }

            // معالجة تسجيل الدخول اليدوي
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                const user = Auth.login(email, password);
                if (user) {
                    window.location.href = 'home.html';
                } else {
                    alert('❌ البريد الإلكتروني أو كلمة المرور غير صحيحة');
                }
            });

            // محاكاة Google Sign-In
            document.getElementById('googleBtn').addEventListener('click', function() {
                const mockGoogleUser = {
                    email: 'google.user@gmail.com',
                    name: 'مستخدم Google',
                    picture: ''
                };
                
                const user = Auth.googleSignIn(mockGoogleUser);
                if (user) {
                    window.location.href = 'home.html';
                }
            });
        });
    </script>
</body>
</html>
