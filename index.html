<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رخاء - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">
                    <i class="fas fa-gem"></i>
                </div>
                <h1>رخاء</h1>
                <p>للتنمية المستدامة</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">تسجيل الدخول</button>
                <button class="auth-tab" id="registerTab">إنشاء حساب جديد</button>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="example@rakha.sa" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="********" required>
                    </div>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> تذكرني
                    </label>
                </div>
                <button type="submit" class="btn-gold btn-block">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </form>

            <!-- نموذج التسجيل -->
            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="registerName" placeholder="محمد أحمد" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="registerEmail" placeholder="example@rakha.sa" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="registerPassword" placeholder="********" required minlength="6">
                    </div>
                </div>
                <div class="form-group">
                    <label>تأكيد كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="registerConfirm" placeholder="********" required>
                    </div>
                </div>
                <button type="submit" class="btn-gold btn-block">
                    <i class="fas fa-user-plus"></i> إنشاء حساب
                </button>
            </form>

            <div class="auth-message" id="authMessage"></div>

            <div class="auth-footer">
                <p>بيانات تجريبية للدخول:</p>
                <p class="demo-accounts">
                    <span><i class="fas fa-user-shield"></i> مدير: admin@rakha.sa / admin123</span>
                    <span><i class="fas fa-user"></i> مستخدم: user@rakha.sa / user123</span>
                </p>
            </div>
        </div>
    </div>

    <script>
        // تهيئة البيانات الافتراضية
        function initSystem() {
            if (!localStorage.getItem('rakha_users')) {
                const defaultUsers = [
                    {
                        id: 1,
                        name: 'مدير النظام',
                        email: 'admin@rakha.sa',
                        password: 'admin123',
                        role: 'admin',
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: 2,
                        name: 'مستخدم تجريبي',
                        email: 'user@rakha.sa',
                        password: 'user123',
                        role: 'user',
                        createdAt: new Date().toISOString()
                    }
                ];
                localStorage.setItem('rakha_users', JSON.stringify(defaultUsers));
            }
            
            if (!localStorage.getItem('rakha_files')) {
                localStorage.setItem('rakha_files', JSON.stringify([]));
            }
        }

        initSystem();

        // التحقق من وجود جلسة نشطة
        const currentUser = JSON.parse(localStorage.getItem('rakha_current_user'));
        if (currentUser) {
            window.location.href = 'home.html';
        }

        // تبديل التبويبات
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        loginTab.addEventListener('click', function() {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        });

        registerTab.addEventListener('click', function() {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.style.display = 'block';
            loginForm.style.display = 'none';
        });

        // عرض الرسائل
        function showMessage(text, type) {
            const msg = document.getElementById('authMessage');
            msg.textContent = text;
            msg.className = `auth-message ${type}`;
            setTimeout(() => {
                msg.className = 'auth-message';
            }, 4000);
        }

        // تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            const users = JSON.parse(localStorage.getItem('rakha_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                const userData = { ...user };
                delete userData.password;
                localStorage.setItem('rakha_current_user', JSON.stringify(userData));
                
                if (rememberMe) {
                    localStorage.setItem('rakha_remember', email);
                }
                
                showMessage('تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
            } else {
                showMessage('البريد الإلكتروني أو كلمة المرور غير صحيحة', 'error');
            }
        });

        // إنشاء حساب جديد
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            
            if (password !== confirm) {
                showMessage('كلمات المرور غير متطابقة', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('rakha_users') || '[]');
            
            if (users.find(u => u.email === email)) {
                showMessage('البريد الإلكتروني مسجل مسبقاً', 'error');
                return;
            }
            
            const newUser = {
                id: Date.now(),
                name: name,
                email: email,
                password: password,
                role: 'user',
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('rakha_users', JSON.stringify(users));
            
            showMessage('تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن', 'success');
            
            setTimeout(() => {
                loginTab.click();
                document.getElementById('loginEmail').value = email;
            }, 1500);
        });

        // تعبئة البريد الإلكتروني المحفوظ
        const remembered = localStorage.getItem('rakha_remember');
        if (remembered) {
            document.getElementById('loginEmail').value = remembered;
            document.getElementById('rememberMe').checked = true;
        }
    </script>
</body>
</html>
