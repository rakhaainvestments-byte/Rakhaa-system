<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - رخاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-gem"></i><span>رخاء</span><span class="logo-sub">للعاملين</span></div>
            <ul class="nav-menu">
                <li><a href="home.html"><i class="fas fa-home"></i> الرئيسية</a></li>
                <li><a href="files.html"><i class="fas fa-folder-open"></i> الملفات</a></li>
                <li><a href="admin.html" class="active"><i class="fas fa-cog"></i> لوحة التحكم</a></li>
            </ul>
            <div class="nav-actions">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
                    <div class="user-dropdown">
                        <div class="user-info"><span id="userName"></span><span>مدير النظام</span></div>
                        <div class="dropdown-divider"></div>
                        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1><i class="fas fa-cog gold-text"></i> لوحة التحكم</h1>
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="users">المستخدمين</button>
            <button class="tab-btn" data-tab="files">الملفات</button>
            <button class="tab-btn" data-tab="pending">طلبات الانضمام</button>
        </div>

        <div id="tab-users" class="tab-content active">
            <table class="data-table">
                <thead><tr><th>الاسم</th><th>البريد</th><th>الدور</th><th>الحالة</th><th>إجراءات</th></tr></thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>

        <div id="tab-files" class="tab-content">
            <div class="stats-grid">
                <div class="stat-box"><i class="fas fa-globe"></i><h3 id="totalPublic">0</h3><p>ملفات عامة</p></div>
                <div class="stat-box"><i class="fas fa-lock"></i><h3 id="totalPrivate">0</h3><p>ملفات خاصة</p></div>
            </div>
            <table class="data-table">
                <thead><tr><th>الملف</th><th>الرافع</th><th>النوع</th><th>تاريخ</th><th>حذف</th></tr></thead>
                <tbody id="filesTable"></tbody>
            </table>
        </div>

        <div id="tab-pending" class="tab-content">
            <table class="data-table">
                <thead><tr><th>الاسم</th><th>البريد</th><th>تاريخ الطلب</th><th>إجراءات</th></tr></thead>
                <tbody id="pendingTable"></tbody>
            </table>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        const currentUser = checkAuth();
        if (!currentUser || currentUser.role !== 'admin') window.location.href = 'home.html';

        let users = [], publicFiles = [], privateFiles = {};

        function loadData() {
            users = JSON.parse(localStorage.getItem('rakha_users') || '[]');
            publicFiles = JSON.parse(localStorage.getItem('public_files') || '[]');
            privateFiles = JSON.parse(localStorage.getItem('private_files') || '{}');
            renderUsers();
            renderFiles();
            renderPending();
        }

        function renderUsers() {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = users.filter(u=>u.role!=='admin').map(u => `
                <tr>
                    <td>${u.name}</td><td>${u.email}</td><td>${u.role}</td>
                    <td><span class="badge ${u.status}">${u.status==='active'?'نشط':u.status==='pending'?'معلق':'محظور'}</span></td>
                    <td>
                        ${u.status==='pending'?`<button class="btn-icon" onclick="approveUser(${u.id})"><i class="fas fa-check"></i></button>`:''}
                        <button class="btn-icon danger" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderFiles() {
            let allFiles = [...publicFiles.map(f=>({...f, folder:'public'}))];
            Object.entries(privateFiles).forEach(([uid, arr])=> { allFiles.push(...arr.map(f=>({...f, folder:'private', ownerId:uid}))); });
            allFiles.sort((a,b)=> new Date(b.uploadDate)-new Date(a.uploadDate));
            document.getElementById('totalPublic').textContent = publicFiles.length;
            document.getElementById('totalPrivate').textContent = allFiles.length - publicFiles.length;
            const tbody = document.getElementById('filesTable');
            tbody.innerHTML = allFiles.map(f => `
                <tr><td>${f.name}</td><td>${f.uploader}</td><td>${f.folder==='public'?'عام':'خاص'}</td>
                <td>${new Date(f.uploadDate).toLocaleDateString('ar-SA')}</td>
                <td><button class="btn-icon danger" onclick="adminDeleteFile('${f.folder}',${f.id},'${f.ownerId||''}')"><i class="fas fa-trash"></i></button></td></tr>
            `).join('');
        }

        function renderPending() {
            const pending = users.filter(u => u.status === 'pending');
            document.getElementById('pendingTable').innerHTML = pending.map(u => `
                <tr><td>${u.name}</td><td>${u.email}</td><td>${new Date(u.createdAt).toLocaleDateString('ar-SA')}</td>
                <td><button class="btn-icon" onclick="approveUser(${u.id})"><i class="fas fa-check"></i></button>
                <button class="btn-icon danger" onclick="rejectUser(${u.id})"><i class="fas fa-times"></i></button></td></tr>
            `).join('');
        }

        window.approveUser = function(id) {
            const user = users.find(u=>u.id===id);
            if (user) { user.status = 'active'; localStorage.setItem('rakha_users', JSON.stringify(users)); loadData(); }
        };
        window.rejectUser = window.deleteUser = function(id) {
            if (!confirm('تأكيد الحذف؟')) return;
            users = users.filter(u=>u.id!==id);
            localStorage.setItem('rakha_users', JSON.stringify(users));
            loadData();
        };
        window.adminDeleteFile = function(folder, id, ownerId) {
            if (!confirm('حذف الملف؟')) return;
            if (folder==='public') {
                publicFiles = publicFiles.filter(f=>f.id!==id);
                localStorage.setItem('public_files', JSON.stringify(publicFiles));
            } else {
                if (privateFiles[ownerId]) {
                    privateFiles[ownerId] = privateFiles[ownerId].filter(f=>f.id!==id);
                    localStorage.setItem('private_files', JSON.stringify(privateFiles));
                }
            }
            loadData();
        };

        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', function(){
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            document.getElementById('tab-'+this.dataset.tab).classList.add('active');
        }));

        document.addEventListener('DOMContentLoaded', ()=>{
            document.getElementById('userName').textContent = currentUser.name;
            loadData();
        });
    </script>
</body>
</html>
