<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رخاء - لوحة تحكم المشرف</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-icon">🌿</span>
                <span>رخاء للتنمية المستدامة</span>
            </div>
            <div class="nav-menu">
                <a href="home.html" class="nav-link">الرئيسية</a>
                <a href="files.html" class="nav-link">الملفات</a>
                <a href="admin.html" class="nav-link active">المشرف</a>
                <div class="user-menu">
                    <span id="userName" class="user-name"></span>
                    <button id="logoutBtn" class="btn btn-outline btn-sm">تسجيل الخروج</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>لوحة تحكم المشرف</h1>
            <p>إدارة المستخدمين والملفات في النظام</p>
        </div>

        <div class="admin-grid">
            <!-- إدارة المستخدمين -->
            <div class="card">
                <h2>👥 المستخدمين</h2>
                <div class="table-responsive">
                    <table class="data-table" id="usersTable">
                        <thead>
                            <tr>
                                <th>البريد الإلكتروني</th>
                                <th>الاسم</th>
                                <th>الدور</th>
                                <th>تاريخ التسجيل</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- إدارة جميع الملفات -->
            <div class="card">
                <h2>📁 جميع الملفات</h2>
                <div class="table-responsive">
                    <table class="data-table" id="allFilesTable">
                        <thead>
                            <tr>
                                <th>اسم الملف</th>
                                <th>المالك</th>
                                <th>النوع</th>
                                <th>تاريخ الرفع</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="allFilesTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="storage.js"></script>
    <script src="auth.js"></script>
    <script src="admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!Auth.isLoggedIn()) {
                window.location.href = 'index.html';
                return;
            }

            const currentUser = Auth.getCurrentUser();
            if (currentUser.role !== 'admin') {
                alert('غير مصرح لك بالدخول إلى هذه الصفحة');
                window.location.href = 'home.html';
                return;
            }

            document.getElementById('userName').textContent = currentUser.name || currentUser.email;

            document.getElementById('logoutBtn').addEventListener('click', function() {
                Auth.logout();
                window.location.href = 'index.html';
            });

            AdminPanel.init();
        });
    </script>
</body>
</html>
