<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رخاء - إدارة الملفات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="brand-icon">🌿</span>
                <span>رخاء للتنمية المستدامة</span>
            </div>
            <div class="nav-menu">
                <a href="home.html" class="nav-link">الرئيسية</a>
                <a href="files.html" class="nav-link active">الملفات</a>
                <a href="admin.html" class="nav-link admin-only" style="display:none;">المشرف</a>
                <div class="user-menu">
                    <span id="userName" class="user-name"></span>
                    <button id="logoutBtn" class="btn btn-outline btn-sm">تسجيل الخروج</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>إدارة الملفات</h1>
            <p>رفع وتنظيم ملفات Excel للاستخدام المشترك أو الخاص</p>
        </div>

        <!-- رفع ملف جديد -->
        <div class="upload-file-section card">
            <h3>رفع ملف جديد</h3>
            <form id="uploadFileForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fileUpload">اختر ملف Excel</label>
                        <input type="file" id="fileUpload" accept=".xlsx,.xls" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="fileName">اسم الملف</label>
                        <input type="text" id="fileName" placeholder="أدخل اسماً للملف" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>نوع الملف</label>
                        <div class="radio-group">
                            <label><input type="radio" name="fileType" value="public" checked> عام (للجميع)</label>
                            <label><input type="radio" name="fileType" value="private"> خاص (فقط لك)</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">رفع الملف</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- تبويبات الملفات -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="public">الملفات العامة</button>
            <button class="tab-btn" data-tab="private">ملفاتي الخاصة</button>
        </div>

        <!-- قائمة الملفات العامة -->
        <div id="publicTab" class="tab-content active">
            <div class="files-grid" id="publicFilesList"></div>
        </div>

        <!-- قائمة الملفات الخاصة -->
        <div id="privateTab" class="tab-content">
            <div class="files-grid" id="privateFilesList"></div>
        </div>
    </main>

    <script src="storage.js"></script>
    <script src="auth.js"></script>
    <script src="files.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!Auth.isLoggedIn()) {
                window.location.href = 'index.html';
                return;
            }

            const currentUser = Auth.getCurrentUser();
            document.getElementById('userName').textContent = currentUser.name || currentUser.email;

            if (currentUser.role === 'admin') {
                document.querySelector('.admin-only').style.display = 'block';
            }

            document.getElementById('logoutBtn').addEventListener('click', function() {
                Auth.logout();
                window.location.href = 'index.html';
            });

            FileManager.init(currentUser);
        });
    </script>
</body>
</html>
