<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملفات - رخاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-gem"></i>
                <span>رخاء</span>
                <span class="logo-sub">للتنمية المستدامة</span>
            </div>
            <ul class="nav-menu">
                <li><a href="home.html"><i class="fas fa-home"></i> الرئيسية</a></li>
                <li><a href="files.html" class="active"><i class="fas fa-folder-open"></i> الملفات</a></li>
                <li><a href="admin.html" id="adminLink" style="display: none;"><i class="fas fa-cog"></i> لوحة التحكم</a></li>
            </ul>
            <div class="nav-actions">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-dropdown">
                        <div class="user-info">
                            <span id="userName"></span>
                            <span id="userRole"></span>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-folder-open gold-text"></i> إدارة الملفات</h1>
            <button class="btn-gold" onclick="openUploadModal()">
                <i class="fas fa-cloud-upload-alt"></i> رفع ملف جديد
            </button>
        </div>

        <!-- معلومات المجلدات -->
        <div class="folders-info">
            <div class="folder-card public">
                <i class="fas fa-folder-open"></i>
                <div class="folder-details">
                    <h3>📁 public.json</h3>
                    <p>الملفات العامة - متاحة للجميع</p>
                    <span class="folder-count" id="publicFolderCount">0 ملف</span>
                </div>
            </div>
            <div class="folder-card private">
                <i class="fas fa-folder"></i>
                <div class="folder-details">
                    <h3>📁 private.json</h3>
                    <p>الملفات الخاصة - مرئية لك فقط</p>
                    <span class="folder-count" id="privateFolderCount">0 ملف</span>
                </div>
            </div>
        </div>

        <!-- مربع البحث -->
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchFiles" placeholder="بحث في الملفات..." onkeyup="searchFiles()">
            </div>
        </div>

        <div class="files-tabs">
            <button class="tab-btn active" onclick="filterFiles('all')">
                <i class="fas fa-globe"></i> جميع الملفات
                <span class="tab-count" id="allCount">0</span>
            </button>
            <button class="tab-btn" onclick="filterFiles('public')">
                <i class="fas fa-folder-open"></i> public.json
                <span class="tab-count" id="publicCount">0</span>
            </button>
            <button class="tab-btn" onclick="filterFiles('private')">
                <i class="fas fa-lock"></i> private.json
                <span class="tab-count" id="privateCount">0</span>
            </button>
        </div>

        <div class="files-container" id="filesContainer">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>جاري تحميل الملفات...</p>
            </div>
        </div>
    </main>

    <!-- مودال رفع ملف -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUploadModal()">&times;</span>
            <h2>رفع ملف جديد</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label>اسم الملف <span class="required">*</span></label>
                    <input type="text" id="fileName" required>
                </div>
                <div class="form-group">
                    <label>وصف الملف</label>
                    <textarea id="fileDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>اختر الملف <span class="required">*</span></label>
                    <input type="file" id="fileInput" required>
                    <small>الحد الأقصى: 10 MB</small>
                </div>
                <div class="form-group">
                    <label>اختر المجلد</label>
                    <div class="folder-select">
                        <label class="folder-option">
                            <input type="radio" name="targetFolder" value="public" checked>
                            <span class="folder-label public">
                                <i class="fas fa-folder-open"></i> public.json (عام)
                            </span>
                        </label>
                        <label class="folder-option">
                            <input type="radio" name="targetFolder" value="private">
                            <span class="folder-label private">
                                <i class="fas fa-folder"></i> private.json (خاص)
                            </span>
                        </label>
                    </div>
                </div>
                <div class="upload-progress" id="uploadProgress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span id="progressText">0%</span>
                </div>
                <button type="submit" class="btn-gold btn-block" id="uploadBtn">رفع الملف</button>
            </form>
        </div>
    </div>

    <!-- مودال معاينة الملف -->
    <div id="previewModal" class="modal">
        <div class="modal-content modal-large">
            <span class="close" onclick="closePreviewModal()">&times;</span>
            <h2 id="previewTitle">معاينة الملف</h2>
            <div id="previewContent"></div>
        </div>
    </div>

    <script>
        // التحقق من تسجيل الدخول
        const currentUser = JSON.parse(localStorage.getItem('rakha_current_user'));
        
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // بيانات الملفات
        let publicFiles = [];
        let privateFiles = [];
        let currentFilter = 'all';
        let searchTerm = '';

        // تهيئة النظام
        async function initSystem() {
            // تهيئة public.json في localStorage
            if (!localStorage.getItem('public_json')) {
                const defaultPublic = { files: [] };
                localStorage.setItem('public_json', JSON.stringify(defaultPublic));
            }
            
            // تهيئة private.json في localStorage
            if (!localStorage.getItem('private_json')) {
                const defaultPrivate = { users: {} };
                localStorage.setItem('private_json', JSON.stringify(defaultPrivate));
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await initSystem();
            updateUserInterface();
            await loadFiles();
        });

        function updateUserInterface() {
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userRole').textContent = currentUser.role === 'admin' ? 'مدير النظام' : 'مستخدم';
            
            if (currentUser.picture) {
                document.getElementById('userAvatar').innerHTML = `<img src="${currentUser.picture}" alt="${currentUser.name}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`;
            }
            
            if (currentUser.role === 'admin') {
                document.getElementById('adminLink').style.display = 'block';
            }
        }

        async function loadFiles() {
            // تحميل public.json
            const publicData = JSON.parse(localStorage.getItem('public_json') || '{"files":[]}');
            publicFiles = publicData.files || [];
            
            // تحميل private.json
            const privateData = JSON.parse(localStorage.getItem('private_json') || '{"users":{}}');
            privateFiles = privateData.users[currentUser.id] || [];
            
            updateCounters();
            displayFiles();
            updateFoldersInfo();
        }

        function updateCounters() {
            const totalFiles = publicFiles.length + privateFiles.length;
            
            document.getElementById('allCount').textContent = totalFiles;
            document.getElementById('publicCount').textContent = publicFiles.length;
            document.getElementById('privateCount').textContent = privateFiles.length;
        }

        function updateFoldersInfo() {
            document.getElementById('publicFolderCount').textContent = `${publicFiles.length} ملف`;
            document.getElementById('privateFolderCount').textContent = `${privateFiles.length} ملف`;
        }

        function filterFiles(type) {
            currentFilter = type;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            displayFiles();
        }

        function searchFiles() {
            searchTerm = document.getElementById('searchFiles').value.toLowerCase();
            displayFiles();
        }

        function displayFiles() {
            const container = document.getElementById('filesContainer');
            
            let filesToShow = [];
            
            if (currentFilter === 'all') {
                filesToShow = [
                    ...publicFiles.map(f => ({ ...f, folder: 'public' })),
                    ...privateFiles.map(f => ({ ...f, folder: 'private' }))
                ];
            } else if (currentFilter === 'public') {
                filesToShow = publicFiles.map(f => ({ ...f, folder: 'public' }));
            } else if (currentFilter === 'private') {
                filesToShow = privateFiles.map(f => ({ ...f, folder: 'private' }));
            }
            
            if (searchTerm) {
                filesToShow = filesToShow.filter(f => 
                    f.name.toLowerCase().includes(searchTerm) ||
                    (f.description && f.description.toLowerCase().includes(searchTerm)) ||
                    f.uploader.toLowerCase().includes(searchTerm)
                );
            }
            
            filesToShow.sort((a, b) => new Date(b.uploadDate) - new Date(a.uploadDate));
            
            if (filesToShow.length === 0) {
                let message = '';
                if (currentFilter === 'public') {
                    message = '📁 public.json فارغ - لا توجد ملفات عامة';
                } else if (currentFilter === 'private') {
                    message = '📁 private.json فارغ - لم تقم برفع أي ملفات خاصة';
                } else {
                    message = 'لا توجد ملفات متاحة';
                }
                
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>${message}</p>
                        <button class="btn-gold" onclick="openUploadModal()">
                            <i class="fas fa-cloud-upload-alt"></i> رفع ملف جديد
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="files-grid">
                    ${filesToShow.map(file => createFileCard(file)).join('')}
                </div>
            `;
        }

        function createFileCard(file) {
            const isOwner = file.uploaderId === currentUser.id || currentUser.role === 'admin';
            const icon = getFileIcon(file.type);
            const folderName = file.folder === 'public' ? 'public.json' : 'private.json';
            
            return `
                <div class="file-card ${file.folder}-file">
                    <div class="file-card-header">
                        <i class="fas ${icon}"></i>
                        <div class="file-badges">
                            <span class="file-badge ${file.folder}">
                                <i class="fas ${file.folder === 'public' ? 'fa-folder-open' : 'fa-folder'}"></i>
                                ${folderName}
                            </span>
                            ${file.uploaderId === currentUser.id ? `
                                <span class="file-badge owner">
                                    <i class="fas fa-user"></i> ملفي
                                </span>
                            ` : ''}
                        </div>
                    </div>
                    <h4 class="file-title" title="${file.name}">${file.name}</h4>
                    <p class="file-description">${file.description || 'لا يوجد وصف'}</p>
                    <div class="file-meta">
                        <span><i class="fas fa-user"></i> ${file.uploader}</span>
                        <span><i class="fas fa-calendar"></i> ${formatDate(file.uploadDate)}</span>
                        <span><i class="fas fa-hdd"></i> ${formatFileSize(file.size)}</span>
                    </div>
                    <div class="file-stats">
                        <span><i class="fas fa-eye"></i> ${file.views || 0}</span>
                        <span><i class="fas fa-download"></i> ${file.downloads || 0}</span>
                    </div>
                    <div class="file-actions">
                        <button class="btn-icon" onclick="previewFile('${file.folder}', ${file.id})" title="معاينة">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn-icon" onclick="downloadFile('${file.folder}', ${file.id})" title="تنزيل">
                            <i class="fas fa-download"></i>
                        </button>
                        ${isOwner ? `
                            <button class="btn-icon" onclick="moveFile('${file.folder}', ${file.id})" title="${file.folder === 'public' ? 'نقل إلى private.json' : 'نقل إلى public.json'}">
                                <i class="fas fa-exchange-alt"></i>
                            </button>
                            <button class="btn-icon danger" onclick="deleteFile('${file.folder}', ${file.id})" title="حذف">
                                <i class="fas fa-trash"></i>
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function getFileIcon(type) {
            if (!type) return 'fa-file';
            if (type.includes('pdf')) return 'fa-file-pdf';
            if (type.includes('excel') || type.includes('spreadsheet')) return 'fa-file-excel';
            if (type.includes('word') || type.includes('document')) return 'fa-file-word';
            if (type.includes('image')) return 'fa-file-image';
            return 'fa-file';
        }

        function formatDate(date) {
            return new Date(date).toLocaleDateString('ar-SA', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function formatFileSize(bytes) {
            if (!bytes) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function openUploadModal() {
            document.getElementById('uploadModal').style.display = 'flex';
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('uploadForm').reset();
            document.getElementById('uploadProgress').style.display = 'none';
        }

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fileName = document.getElementById('fileName').value.trim();
            const description = document.getElementById('fileDescription').value.trim();
            const fileInput = document.getElementById('fileInput');
            const targetFolder = document.querySelector('input[name="targetFolder"]:checked').value;
            
            if (!fileInput.files[0]) {
                alert('يرجى اختيار ملف');
                return;
            }
            
            const file = fileInput.files[0];
            
            if (file.size > 10 * 1024 * 1024) {
                alert('حجم الملف كبير جداً. الحد الأقصى 10 MB');
                return;
            }
            
            const progressDiv = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const uploadBtn = document.getElementById('uploadBtn');
            
            progressDiv.style.display = 'block';
            uploadBtn.disabled = true;
            
            const reader = new FileReader();
            
            reader.onload = async function(event) {
                const newFile = {
                    id: Date.now(),
                    name: fileName || file.name.replace(/\.[^/.]+$/, ""),
                    description: description,
                    originalName: file.name,
                    type: file.type,
                    size: file.size,
                    data: event.target.result.split(',')[1],
                    uploader: currentUser.name,
                    uploaderId: currentUser.id,
                    uploadDate: new Date().toISOString(),
                    downloads: 0,
                    views: 0
                };
                
                // حفظ الملف في المجلد المناسب
                if (targetFolder === 'public') {
                    const publicData = JSON.parse(localStorage.getItem('public_json') || '{"files":[]}');
                    publicData.files.push(newFile);
                    localStorage.setItem('public_json', JSON.stringify(publicData));
                } else {
                    const privateData = JSON.parse(localStorage.getItem('private_json') || '{"users":{}}');
                    if (!privateData.users[currentUser.id]) {
                        privateData.users[currentUser.id] = [];
                    }
                    privateData.users[currentUser.id].push(newFile);
                    localStorage.setItem('private_json', JSON.stringify(privateData));
                }
                
                progressFill.style.width = '100%';
                progressText.textContent = '100%';
                
                setTimeout(() => {
                    closeUploadModal();
                    loadFiles();
                    alert(`تم رفع الملف بنجاح في ${targetFolder === 'public' ? 'public.json' : 'private.json'}!`);
                    
                    progressDiv.style.display = 'none';
                    progressFill.style.width = '0%';
                    progressText.textContent = '0%';
                    uploadBtn.disabled = false;
                }, 500);
            };
            
            reader.onprogress = function(event) {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    progressFill.style.width = percent + '%';
                    progressText.textContent = percent + '%';
                }
            };
            
            reader.readAsDataURL(file);
        });

        function previewFile(folder, fileId) {
            let file;
            if (folder === 'public') {
                file = publicFiles.find(f => f.id === fileId);
            } else {
                file = privateFiles.find(f => f.id === fileId);
            }
            
            if (!file) return;
            
            file.views = (file.views || 0) + 1;
            saveFileData(folder);
            
            const modal = document.getElementById('previewModal');
            const title = document.getElementById('previewTitle');
            const content = document.getElementById('previewContent');
            
            title.textContent = `${file.name} (${folder}.json)`;
            
            if (file.type && file.type.includes('image')) {
                content.innerHTML = `
                    <div style="text-align: center;">
                        <img src="data:${file.type};base64,${file.data}" alt="${file.name}" style="max-width: 100%; max-height: 70vh; border-radius: 8px;">
                    </div>
                `;
            } else if (file.type && file.type.includes('pdf')) {
                content.innerHTML = `
                    <iframe src="data:application/pdf;base64,${file.data}" width="100%" height="600px" style="border: none; border-radius: 8px;"></iframe>
                `;
            } else {
                content.innerHTML = `
                    <div class="empty-state">
                        <i class="fas ${getFileIcon(file.type)}" style="font-size: 4rem;"></i>
                        <p>لا يمكن معاينة هذا النوع من الملفات</p>
                        <button class="btn-gold" onclick="downloadFile('${folder}', ${file.id}); closePreviewModal();">
                            <i class="fas fa-download"></i> تنزيل الملف
                        </button>
                    </div>
                `;
            }
            
            modal.style.display = 'flex';
        }

        function closePreviewModal() {
            document.getElementById('previewModal').style.display = 'none';
        }

        function downloadFile(folder, fileId) {
            let file;
            if (folder === 'public') {
                file = publicFiles.find(f => f.id === fileId);
            } else {
                file = privateFiles.find(f => f.id === fileId);
            }
            
            if (!file) return;
            
            file.downloads = (file.downloads || 0) + 1;
            saveFileData(folder);
            
            const link = document.createElement('a');
            link.href = `data:${file.type};base64,${file.data}`;
            link.download = file.originalName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function moveFile(fromFolder, fileId) {
            let file;
            if (fromFolder === 'public') {
                file = publicFiles.find(f => f.id === fileId);
            } else {
                file = privateFiles.find(f => f.id === fileId);
            }
            
            if (!file) return;
            
            if (currentUser.id !== file.uploaderId && currentUser.role !== 'admin') {
                alert('ليس لديك صلاحية لنقل هذا الملف');
                return;
            }
            
            const toFolder = fromFolder === 'public' ? 'private' : 'public';
            
            if (!confirm(`هل أنت متأكد من نقل الملف من ${fromFolder}.json إلى ${toFolder}.json؟`)) return;
            
            // حذف من المجلد القديم
            if (fromFolder === 'public') {
                publicFiles = publicFiles.filter(f => f.id !== fileId);
                const publicData = JSON.parse(localStorage.getItem('public_json') || '{"files":[]}');
                publicData.files = publicFiles;
                localStorage.setItem('public_json', JSON.stringify(publicData));
            } else {
                privateFiles = privateFiles.filter(f => f.id !== fileId);
                const privateData = JSON.parse(localStorage.getItem('private_json') || '{"users":{}}');
                privateData.users[currentUser.id] = privateFiles;
                localStorage.setItem('private_json', JSON.stringify(privateData));
            }
            
            // إضافة إلى المجلد الجديد
            if (toFolder === 'public') {
                const publicData = JSON.parse(localStorage.getItem('public_json') || '{"files":[]}');
                publicData.files.push(file);
                localStorage.setItem('public_json', JSON.stringify(publicData));
            } else {
                const privateData = JSON.parse(localStorage.getItem('private_json') || '{"users":{}}');
                if (!privateData.users[currentUser.id]) {
                    privateData.users[currentUser.id] = [];
                }
                privateData.users[currentUser.id].push(file);
                localStorage.setItem('private_json', JSON.stringify(privateData));
            }
            
            loadFiles();
            alert(`تم نقل الملف إلى ${toFolder}.json بنجاح`);
        }

        function deleteFile(folder, fileId) {
            let file;
            if (folder === 'public') {
                file = publicFiles.find(f => f.id === fileId);
            } else {
                file = privateFiles.find(f => f.id === fileId);
            }
            
            if (!file) return;
            
            if (currentUser.id !== file.uploaderId && currentUser.role !== 'admin') {
                alert('ليس لديك صلاحية لحذف هذا الملف');
                return;
            }
            
            if (!confirm(`هل أنت متأكد من حذف هذا الملف من ${folder}.json؟`)) return;
            
            if (folder === 'public') {
                publicFiles = publicFiles.filter(f => f.id !== fileId);
                const publicData = JSON.parse(localStorage.getItem('public_json') || '{"files":[]}');
                publicData.files = publicFiles;
                localStorage.setItem('public_json', JSON.stringify(publicData));
            } else {
                privateFiles = privateFiles.filter(f => f.id !== fileId);
                const privateData = JSON.parse(localStorage.getItem('private_json') || '{"users":{}}');
                privateData.users[currentUser.id] = privateFiles;
                localStorage.setItem('private_json', JSON.stringify(privateData));
            }
            
            loadFiles();
            alert('تم حذف الملف بنجاح');
        }

        function saveFileData(folder) {
            if (folder === 'public') {
                const publicData = JSON.parse(localStorage.getItem('public_json') || '{"files":[]}');
                publicData.files = publicFiles;
                localStorage.setItem('public_json', JSON.stringify(publicData));
            } else {
                const privateData = JSON.parse(localStorage.getItem('private_json') || '{"users":{}}');
                privateData.users[currentUser.id] = privateFiles;
                localStorage.setItem('private_json', JSON.stringify(privateData));
            }
        }

        function logout() {
            localStorage.removeItem('rakha_current_user');
            window.location.href = 'index.html';
        }

        window.addEventListener('click', function(e) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
