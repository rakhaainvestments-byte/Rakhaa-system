<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملفات - رخاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-gem"></i>
                <span>رخاء</span>
                <span class="logo-sub">للتنمية المستدامة</span>
            </div>
            <ul class="nav-menu">
                <li><a href="home.html"><i class="fas fa-home"></i> الرئيسية</a></li>
                <li><a href="files.html" class="active"><i class="fas fa-folder-open"></i> الملفات</a></li>
                <li><a href="admin.html" id="adminLink" style="display: none;"><i class="fas fa-cog"></i> لوحة التحكم</a></li>
            </ul>
            <div class="nav-actions">
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-dropdown">
                        <div class="user-info">
                            <span id="userName"></span>
                            <span id="userRole"></span>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-folder-open gold-text"></i> إدارة الملفات</h1>
            <button class="btn-gold" onclick="openUploadModal()">
                <i class="fas fa-cloud-upload-alt"></i> رفع ملف جديد
            </button>
        </div>

        <div class="files-tabs">
            <button class="tab-btn active" onclick="filterFiles('all')">جميع الملفات</button>
            <button class="tab-btn" onclick="filterFiles('public')">الملفات العامة</button>
            <button class="tab-btn" onclick="filterFiles('private')">ملفاتي الخاصة</button>
        </div>

        <div class="files-container" id="filesContainer">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>جاري تحميل الملفات...</p>
            </div>
        </div>
    </main>

    <!-- مودال رفع ملف -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUploadModal()">&times;</span>
            <h2>رفع ملف جديد</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label>اسم الملف</label>
                    <input type="text" id="fileName" required>
                </div>
                <div class="form-group">
                    <label>وصف الملف</label>
                    <textarea id="fileDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>اختر الملف</label>
                    <input type="file" id="fileInput" required>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="fileIsPublic"> ملف عام (يمكن للجميع رؤيته)
                    </label>
                </div>
                <button type="submit" class="btn-gold btn-block">رفع الملف</button>
            </form>
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('rakha_current_user'));
        
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        let currentFilter = 'all';
        let allFiles = [];

        document.addEventListener('DOMContentLoaded', function() {
            updateUserInterface();
            loadFiles();
        });

        function updateUserInterface() {
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userRole').textContent = currentUser.role === 'admin' ? 'مدير النظام' : 'مستخدم';
            
            if (currentUser.role === 'admin') {
                document.getElementById('adminLink').style.display = 'block';
            }
        }

        function loadFiles() {
            allFiles = JSON.parse(localStorage.getItem('rakha_files') || '[]');
            displayFiles();
        }

        function filterFiles(type) {
            currentFilter = type;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            displayFiles();
        }

        function displayFiles() {
            const container = document.getElementById('filesContainer');
            
            let filesToShow = allFiles;
            
            if (currentFilter === 'public') {
                filesToShow = allFiles.filter(f => f.isPublic);
            } else if (currentFilter === 'private') {
                filesToShow = allFiles.filter(f => !f.isPublic && f.uploaderId === currentUser.id);
            } else {
                filesToShow = allFiles.filter(f => f.isPublic || f.uploaderId === currentUser.id);
            }
            
            if (filesToShow.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>لا توجد ملفات ${currentFilter === 'public' ? 'عامة' : currentFilter === 'private' ? 'خاصة' : ''}</p>
                        <button class="btn-gold" onclick="openUploadModal()">رفع ملف جديد</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="files-grid">
                    ${filesToShow.sort((a, b) => new Date(b.uploadDate) - new Date(a.uploadDate)).map(file => `
                        <div class="file-card">
                            <div class="file-card-header">
                                <i class="fas ${getFileIcon(file.type)}"></i>
                                <span class="file-badge ${file.isPublic ? 'public' : 'private'}">
                                    ${file.isPublic ? 'عام' : 'خاص'}
                                </span>
                            </div>
                            <h4>${file.name}</h4>
                            <p class="file-description">${file.description || 'لا يوجد وصف'}</p>
                            <div class="file-meta">
                                <span><i class="fas fa-user"></i> ${file.uploader}</span>
                                <span><i class="fas fa-calendar"></i> ${formatDate(file.uploadDate)}</span>
                            </div>
                            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                                <button class="btn-icon" onclick="downloadFile(${file.id})" title="تنزيل">
                                    <i class="fas fa-download"></i>
                                </button>
                                ${currentUser && (currentUser.role === 'admin' || currentUser.id === file.uploaderId) ? `
                                    <button class="btn-icon danger" onclick="deleteFile(${file.id})" title="حذف">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function openUploadModal() {
            document.getElementById('uploadModal').style.display = 'flex';
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('uploadForm').reset();
        }

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fileName = document.getElementById('fileName').value;
            const description = document.getElementById('fileDescription').value;
            const fileInput = document.getElementById('fileInput');
            const isPublic = document.getElementById('fileIsPublic').checked;
            
            if (!fileInput.files[0]) {
                alert('يرجى اختيار ملف');
                return;
            }
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const newFile = {
                    id: Date.now(),
                    name: fileName,
                    description: description,
                    originalName: file.name,
                    type: file.type,
                    size: file.size,
                    data: event.target.result.split(',')[1],
                    uploader: currentUser.name,
                    uploaderId: currentUser.id,
                    uploadDate: new Date().toISOString(),
                    isPublic: isPublic,
                    downloads: 0,
                    views: 0
                };
                
                allFiles.push(newFile);
                localStorage.setItem('rakha_files', JSON.stringify(allFiles));
                
                closeUploadModal();
                displayFiles();
                alert('تم رفع الملف بنجاح!');
            };
            
            reader.readAsDataURL(file);
        });

        function downloadFile(fileId) {
            const file = allFiles.find(f => f.id === fileId);
            if (!file) return;
            
            file.downloads = (file.downloads || 0) + 1;
            localStorage.setItem('rakha_files', JSON.stringify(allFiles));
            
            const link = document.createElement('a');
            link.href = `data:${file.type};base64,${file.data}`;
            link.download = file.originalName;
            link.click();
        }

        function deleteFile(fileId) {
            if (!confirm('هل أنت متأكد من حذف هذا الملف؟')) return;
            
            allFiles = allFiles.filter(f => f.id !== fileId);
            localStorage.setItem('rakha_files', JSON.stringify(allFiles));
            displayFiles();
        }

        function getFileIcon(type) {
            if (type.includes('pdf')) return 'fa-file-pdf';
            if (type.includes('excel') || type.includes('spreadsheet')) return 'fa-file-excel';
            if (type.includes('word') || type.includes('document')) return 'fa-file-word';
            if (type.includes('image')) return 'fa-file-image';
            return 'fa-file';
        }

        function formatDate(date) {
            return new Date(date).toLocaleDateString('ar-SA');
        }

        function logout() {
            localStorage.removeItem('rakha_current_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
